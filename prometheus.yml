global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'fastapi_microservices'
    static_configs:
      - targets:
        # Тут мають бути назви твоїх контейнерів з бекендом і порти.
        # Наприклад, якщо твій gateway називається api-gateway у docker-compose:
        - 'host.docker.internal:8000'
        - 'host.docker.internal:8001'
        - 'host.docker.internal:8002'
        - 'host.docker.internal:8003'
        - 'host.docker.internal:8004'

  - job_name: 'docker_metrics'
    static_configs:
      - targets: ['cadvisor_container:8080']